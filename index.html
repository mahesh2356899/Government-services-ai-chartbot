<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Government Services Assistant</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:380px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
overflow:hidden;
}

.header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.chat-box{
height:420px;
overflow-y:auto;
padding:15px;
background:#e6e6e6;
}

.bot-message{
background:white;
padding:12px;
border-radius:15px;
margin-bottom:10px;
max-width:75%;
}

.user-message{
background:#1976d2;
color:white;
padding:10px 15px;
border-radius:15px;
margin-bottom:10px;
margin-left:auto;
max-width:60%;
}

.speaker{
cursor:pointer;
margin-left:10px;
}

.input-area{
display:flex;
padding:10px;
background:#f5f5f5;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

button{
margin-left:8px;
background:#1976d2;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

.mic{
font-size:18px;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
📁 AI Government Services Assistant
</div>

<div class="chat-box" id="chatBox">

<div class="bot-message">
Hello 👋 I am your Government Assistant. How can I help you?
<span class="speaker" onclick="speakText('Hello I am your Government Assistant. How can I help you')">🔊</span>
</div>

</div>

<div class="input-area">

<input type="text" id="userInput" placeholder="Ask about Ration card, PAN card">

<button class="mic" onclick="startVoice()">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

function speakText(text){
let speech=new SpeechSynthesisUtterance(text);
speech.lang="en-US";
speechSynthesis.speak(speech);
}

function sendMessage(){

let input=document.getElementById("userInput").value.toLowerCase();
let chatBox=document.getElementById("chatBox");

if(input=="") return;

let userDiv=document.createElement("div");
userDiv.className="user-message";
userDiv.innerText=input;
chatBox.appendChild(userDiv);

let reply="";

if(input.includes("pan"))
reply="You can apply for PAN card at https://www.onlineservices.nsdl.com";

else if(input.includes("ration"))
reply="You can apply for Ration card at https://epds.ap.gov.in";

else if(input.includes("aadhaar"))
reply="Visit https://uidai.gov.in for Aadhaar services";

else
reply="Please ask about PAN card, Ration card or Aadhaar";

let botDiv=document.createElement("div");
botDiv.className="bot-message";

botDiv.innerHTML=reply +
` <span class="speaker" onclick="speakText('${reply}')">🔊</span>`;

chatBox.appendChild(botDiv);

document.getElementById("userInput").value="";

chatBox.scrollTop=chatBox.scrollHeight;

}

function startVoice(){

const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang="en-US";

recognition.start();

recognition.onresult=function(event){

let text=event.results[0][0].transcript;

document.getElementById("userInput").value=text;

}

}

</script>

</body>
</html>
